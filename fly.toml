# fly.toml app configuration file generated for amcoeur-webapp on 2023-10-10T15:18:29+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "amcoeur-webapp"
primary_region = "cdg"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_LEVEL = "info"
  API_URL = "https://api.amcoeur.org"

  OVH_MAILING_LIST = "amcoeur"

  CONTACT_EMAIL = "contact@amcoeur.org"
  NEWSLETTER_EMAIL="newsletter@amcoeur.org"
  NEWSLETTER_TARGET_EMAIL = "amcoeur@amcoeur.org"
  NOREPLY_EMAIL = "noreply@amcoeur.org"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[mounts]
  source="images"
  destination="/app/apps/server/uploads"

[metrics]
  port = 3000
  path = "/stats/metrics"
